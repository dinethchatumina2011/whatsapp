<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>𝗖𝗛𝗔𝗧𝗛𝗨𝗪𝗔 𝗫 𝗠𝗜𝗡𝗜</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #030308;
      background-image: 
        radial-gradient(at 0% 0%, hsla(244,100%,13%,0.6) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(342,100%,15%,0.5) 0px, transparent 50%),
        radial-gradient(at 50% 50%, hsla(210,100%,10%,0.5) 0px, transparent 80%);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      color: #f0f3ff;
    }

    /* --- FUTURISTIC MATRIX LOADER --- */
    .initial-loader-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020205;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      opacity: 1;
      visibility: visible;
    }

    .initial-loader-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .cinematic-loader {
      text-align: center;
      padding: 2rem;
      max-width: 450px;
      width: 90vw;
    }

    .cinema-profile {
      width: 110px;
      height: 110px;
      margin: 0 auto 25px;
      border-radius: 24px;
      padding: 4px;
      background: linear-gradient(135deg, #00f2fe, #4facfe, #ff0844);
      box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
      position: relative;
    }

    .cinema-profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      background: #000;
    }

    .cinema-title {
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
      margin-bottom: 5px;
    }

    .cinema-sub {
      color: #00f2fe;
      font-size: 0.8rem;
      letter-spacing: 4px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .film-progress {
      width: 100%;
      margin: 20px auto;
    }

    .film-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .film-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00f2fe, #ff0844);
      box-shadow: 0 0 10px #00f2fe;
      animation: fillCinema 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes fillCinema {
      0% { width: 0%; }
      50% { width: 60%; }
      100% { width: 100%; }
    }

    .cinema-percent {
      font-size: 0.85rem;
      color: #a0aec0;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .reel-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0;
    }

    .reel-dot {
      width: 6px;
      height: 6px;
      background: #00f2fe;
      border-radius: 50%;
      opacity: 0.3;
    }
    .reel-dot:nth-child(1) { animation: pulseGlow 1s infinite alternate; }
    .reel-dot:nth-child(2) { animation: pulseGlow 1s infinite alternate 0.2s; }
    .reel-dot:nth-child(3) { animation: pulseGlow 1s infinite alternate 0.4s; }

    @keyframes pulseGlow {
      to { transform: scale(1.4); opacity: 1; background: #ff0844; }
    }

    .cinema-quote {
      font-size: 0.7rem;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- PREMIUM 2026 DASHBOARD INTERFACE --- */
    .main-pair-web {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s;
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .main-pair-web.visible {
      opacity: 1;
      visibility: visible;
    }

    .premium-card {
      width: min(450px, 100%);
      background: rgba(10, 11, 20, 0.7);
      border-radius: 32px;
      padding: 35px 25px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    /* Floating ambient light behind card */
    .premium-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,242,254,0.3), rgba(255,8,68,0.1), rgba(0,242,254,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .time-panel-premium {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.02);
      padding: 10px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .date-premium {
      font-size: 0.75rem;
      color: #a0aec0;
      font-weight: 500;
    }

    .time-premium {
      font-size: 1rem;
      font-weight: 700;
      font-family: monospace;
      color: #00f2fe;
    }

    .premium-logo {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, rgba(0,242,254,0.1), rgba(255,8,68,0.1));
      border: 1px solid rgba(0, 242, 254, 0.2);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #00f2fe;
      box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.1);
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 0.75rem;
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Sleek Input Fields */
    .input-premium {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 30px 0 15px;
    }

    .input-premium input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 0.95rem;
      color: #fff;
      outline: none;
      transition: all 0.3s;
      text-align: center;
      letter-spacing: 1px;
    }

    .input-premium input:focus {
      border-color: #00f2fe;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
    }

    .input-premium button {
      width: 100%;
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      color: #000;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .input-premium button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
    }

    /* Output Section Card */
    .code-premium-card {
      background: rgba(0, 242, 254, 0.03);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0 10px;
      border: 1px solid rgba(0, 242, 254, 0.15);
      cursor: pointer;
      transition: all 0.3s;
    }

    .code-premium-card:hover {
      background: rgba(0, 242, 254, 0.06);
      border-color: #00f2fe;
    }

    .code-number-premium {
      background: rgba(0, 0, 0, 0.5);
      padding: 14px 25px;
      border-radius: 12px;
      font-size: 1.6rem;
      font-weight: 800;
      font-family: monospace;
      display: inline-block;
      color: #00f2fe;
      letter-spacing: 3px;
      margin: 12px 0;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Creator Profile footer */
    .creator-section {
      margin-top: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .creator-avatar-small {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #ff0844;
    }

    .creator-avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-text {
      font-size: 0.75rem;
      color: #a0aec0;
    }

    .creator-text span {
      color: #fff;
      font-weight: 700;
    }

    footer {
      font-size: 0.65rem;
      margin-top: 15px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      .premium-card {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body>

<div class="initial-loader-screen" id="initialLoader">
  <div class="cinematic-loader">
    <div class="cinema-profile">
      <img src="https://cdn.phototourl.com/free/2026-06-30-6f0acaed-3fbd-40fc-b215-31440c3310e8.jpg" alt="Profile" onerror="this.src='https://cdn.phototourl.com/free/2026-06-30-6f0acaed-3fbd-40fc-b215-31440c3310e8.jpg'">
    </div>
    
    <div class="cinema-title">𝗖𝗛𝗔𝗧𝗛𝗨𝗪𝗔 𝗫 𝗠𝗜𝗡𝗜</div>
    <div class="cinema-sub">SYSTEM PAIRING VIA SECURE NODE</div>
    
    <div class="film-progress">
      <div class="film-track">
        <div class="film-fill"></div>
      </div>
    </div>
    
    <div class="cinema-percent" id="loadingPercent">LOADING 0%</div>
    
    <div class="reel-dots">
      <div class="reel-dot"></div>
      <div class="reel-dot"></div>
      <div class="reel-dot"></div>
    </div>
    
    <div class="cinema-quote">
      <i class="fas fa-terminal"></i> initializing environment core
    </div>
  </div>
</div>

<div class="main-pair-web" id="mainPairWeb">
  <div class="premium-card">
    <div class="time-panel-premium">
      <div class="date-premium"><i class="fas fa-satellite"></i> <span id="slDatePremium">Loading Node...</span></div>
      <div class="time-premium" id="slTimePremium">--:--:--</div>
    </div>

    <div class="premium-logo">
      <i class="fas fa-shield-halved"></i>
    </div>
    <h2>𝗖𝗛𝗔𝗧𝗛𝗨𝗪𝗔 𝗫 𝗠𝗜𝗡𝗜</h2>
    <div class="sub" style="color:#6f7c95; margin-bottom: 10px;">WHATSAPP MULTIDEVICE PARALLEL GATEWAY</div>

    <div class="input-premium">
      <input type="tel" id="phoneNumberPremium" placeholder="+94 XX XXX XXXX" autocomplete="off">
      <button id="pairBtnPremium"><i class="fas fa-bolt-lightning"></i> REQUEST CODE</button>
    </div>

    <div id="premiumPairArea"></div>
    
    <div class="creator-section">
      <div class="creator-avatar-small">
        <img src="https://cdn.phototourl.com/free/2026-06-30-6f0acaed-3fbd-40fc-b215-31440c3310e8.jpg" alt="ZEUS INC" onerror="this.src='https://cdn.phototourl.com/free/2026-06-30-6f0acaed-3fbd-40fc-b215-31440c3310e8.jpg'">
      </div>
      <div class="creator-text">
        CORE ARCHITECT: <span>𝗖𝗛𝗔𝗧𝗛𝗨𝗪𝗔 </span>
      </div>
    </div>
    
    <footer>SECURED ENCRYPTED CONNECTION SYSTEM</footer>
  </div>
</div>

<script>
  // ========== CINEMATIC LOADING WITH PERCENTAGE ==========
  const loaderScreen = document.getElementById('initialLoader');
  const mainWeb = document.getElementById('mainPairWeb');
  const percentSpan = document.getElementById('loadingPercent');
  
  let percent = 0;
  const interval = setInterval(() => {
    const increment = Math.floor(Math.random() * 12) + 4;
    percent += increment;
    if (percent >= 100) {
      percent = 100;
      clearInterval(interval);
      percentSpan.innerText = 'AUTHENTICATED';
      setTimeout(() => {
        loaderScreen.classList.add('hide');
        mainWeb.classList.add('visible');
      }, 500);
    }
    percentSpan.innerText = `LOADING CORE ARCH ${percent}%`;
  }, 180);

  setTimeout(() => {
    if (!mainWeb.classList.contains('visible')) {
      clearInterval(interval);
      loaderScreen.classList.add('hide');
      mainWeb.classList.add('visible');
    }
  }, 4200);

  // ========== SRI LANKA TIME (UTC+5:30) ==========
  function updateSriLankaPremium() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const slTime = new Date(utc + (5.5 * 3600000));
    const dateStr = slTime.toLocaleDateString('en-LK', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', timeZone: 'Asia/Colombo' });
    const timeStr = slTime.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Colombo' });
    if (document.getElementById('slDatePremium')) {
      document.getElementById('slDatePremium').innerText = dateStr;
      document.getElementById('slTimePremium').innerText = timeStr;
    }
  }
  updateSriLankaPremium();
  setInterval(updateSriLankaPremium, 1000);

  // ========== PAIR WEB FUNCTIONALITY ==========
  const pairArea = document.getElementById("premiumPairArea");
  const phoneInput = document.getElementById("phoneNumberPremium");
  const pairBtn = document.getElementById("pairBtnPremium");

  function clearArea() {
    if (pairArea) pairArea.innerHTML = "";
  }

  function showLoadingState(message = "initializing secure tunnel") {
    clearArea();
    const loaderDiv = document.createElement("div");
    loaderDiv.style.background = "rgba(0,0,0,0.4)";
    loaderDiv.style.borderRadius = "16px";
    loaderDiv.style.padding = "20px";
    loaderDiv.style.margin = "15px 0";
    loaderDiv.style.textAlign = "center";
    loaderDiv.style.border = "1px solid rgba(0, 242, 254, 0.3)";
    loaderDiv.innerHTML = `
      <div style="display:flex; justify-content:center; gap:12px; margin-bottom:12px;">
        <div style="width: 20px; height:20px; border:2px solid #00f2fe; border-top-color:transparent; border-radius:50%; animation: spin 0.7s linear infinite;"></div>
      </div>
      <div style="color:#00f2fe; font-size:0.8rem; font-family:monospace; text-transform:uppercase;">${message}</div>
    `;
    pairArea.appendChild(loaderDiv);
  }

  function showError(text) {
    clearArea();
    const errDiv = document.createElement("div");
    errDiv.style.background = "rgba(255, 8, 68, 0.1)";
    errDiv.style.borderRadius = "16px";
    errDiv.style.padding = "14px";
    errDiv.style.border = "1px solid rgba(255, 8, 68, 0.4)";
    errDiv.style.textAlign = "center";
    errDiv.style.color = "#ff0844";
    errDiv.style.fontSize = "0.85rem";
    errDiv.innerHTML = `<i class="fas fa-triangle-exclamation"></i> ${text}`;
    pairArea.appendChild(errDiv);
  }

  function displayCode(code) {
    clearArea();
    const codeCard = document.createElement("div");
    codeCard.className = "code-premium-card";
    codeCard.innerHTML = `
      <div style="font-size:0.7rem; color:#a0aec0; letter-spacing:1px;"><i class="fas fa-fingerprint"></i> SECURE SECURITY CODE</div>
      <div id="premiumCodeBlock" class="code-number-premium">${escapeHtml(code)}</div>
      <div class="copy-notice" style="font-size:0.7rem; color:#00f2fe; text-transform:uppercase;"><i class="far fa-copy"></i> click string to copy</div>
    `;
    pairArea.appendChild(codeCard);
    const codeElem = document.getElementById("premiumCodeBlock");
    codeElem.addEventListener("click", async () => {
      const original = codeElem.innerText;
      try {
        await navigator.clipboard.writeText(original);
        codeElem.innerText = "COPIED";
        codeElem.style.color = "#000";
        codeElem.style.background = "#00f2fe";
        setTimeout(() => { 
          codeElem.innerText = original;
          codeElem.style.color = "#00f2fe";
          codeElem.style.background = "rgba(0, 0, 0, 0.5)";
        }, 1300);
      } catch(e) { 
        codeElem.innerText = "MANUAL COPY";
        setTimeout(() => { codeElem.innerText = original; }, 1000);
      }
    });
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function validateNumber(raw) {
    let digits = raw.replace(/[^0-9]/g, "");
    if (!digits.length) return null;
    if (digits.startsWith("0") && digits.length === 10) digits = "94" + digits.substring(1);
    if (digits.length === 9 && digits.startsWith("7")) digits = "94" + digits;
    if (digits.length < 8 || digits.length > 13) return null;
    return digits;
  }

  pairBtn.addEventListener("click", async (e) => {
    e.preventDefault();
    let rawVal = phoneInput.value.trim();
    if (!rawVal) {
      showError("Please enter your WhatsApp number");
      return;
    }
    const cleaned = validateNumber(rawVal);
    if (!cleaned) {
      showError("Invalid format. Use style: +94XXXXXXXXX");
      return;
    }
    let displayNumber = cleaned;
    if (cleaned.startsWith("94") && cleaned.length >= 11) {
      displayNumber = `+${cleaned.slice(0,3)} ${cleaned.slice(3,6)} ${cleaned.slice(6)}`;
    }
    phoneInput.value = displayNumber;
    
    showLoadingState(`establishing connection pipeline...`);
    await new Promise(r => setTimeout(r, 800));
    
    try {
      const response = await axios.get(`/code?number=${cleaned}`, { timeout: 15000 });
      let pairCode = response.data?.code || response.data?.pairCode;
      if (!pairCode || pairCode === "Service Unavailable") {
        showError("Handshake dropped. Server unreachable.");
      } else {
        displayCode(pairCode);
      }
    } catch (error) {
      showError("Gateway routing failed. Check setup.");
    }
  });

  phoneInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") pairBtn.click();
  });
  
  const initMsg = document.createElement("div");
  initMsg.style.marginTop = "16px";
  initMsg.style.fontSize = "0.7rem";
  initMsg.style.color = "#4a5568";
  initMsg.style.letterSpacing = "1px";
  initMsg.innerHTML = "<i class='fas fa-circle-check'></i> SYSTEM READY FOR INBOUND PAIR REQUESTS";
  if (pairArea) pairArea.appendChild(initMsg);
  
  const styleSheet = document.createElement("style");
  styleSheet.textContent = `
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  `;
  document.head.appendChild(styleSheet);
</script>
</body>
</html>
